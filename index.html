.page-overlay{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 130% 130% at 50% 50%,rgba(10,4,1,0.15) 0%,rgba(5,2,0,0.68) 100%),linear-gradient(to bottom,rgba(5,2,0,0.5) 0%,rgba(0,0,0,0.0) 35%,rgba(0,0,0,0.0) 65%,rgba(5,2,0,0.55) 100%);}
.page-grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.28;mix-blend-mode:multiply;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");}
canvas#particles{position:fixed;inset:0;pointer-events:none;z-index:3;}

.page{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem 4rem;}

/* HEADER */
.header{text-align:center;margin-bottom:1.4rem;padding:0.5rem 2.2rem;background:rgba(20,8,2,0.45);border:1px solid rgba(200,160,60,0.3);backdrop-filter:blur(10px);}
.header-eyebrow{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:0.4em;color:rgba(220,185,90,0.65);text-transform:uppercase;margin-bottom:3px;}
.header-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:27px;color:#f0e0c0;text-shadow:0 2px 22px rgba(180,130,40,0.55);letter-spacing:0.06em;}

/* THEME CONTROLS */
.controls-bar{display:flex;gap:5px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:1.4rem;}
.ctrl-btn{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:0.18em;padding:5px 15px;border:1px solid rgba(180,135,40,0.32);background:rgba(12,5,1,0.55);color:rgba(220,185,90,0.7);cursor:pointer;transition:all 0.2s;backdrop-filter:blur(6px);text-transform:uppercase;}
.ctrl-btn:hover{background:rgba(40,22,4,0.75);color:#e8c870;border-color:rgba(220,185,90,0.5);}
.ctrl-btn.on{background:rgba(180,135,40,0.28);border-color:#e0c060;color:#f8e8a0;box-shadow:0 0 10px rgba(180,135,40,0.22);}

/* SCENE */
.scene{display:flex;flex-direction:column;align-items:center;}

/* JAR CONTAINER — holds SVG jar + LED canvas */
.jar-outer{position:relative;width:220px;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:0;}
.jar-outer:hover .jar-svg{transform:translateY(-6px) scale(1.018);}
.jar-outer:active .jar-svg{transform:scale(0.97);}
.jar-svg{display:block;width:100%;transition:transform 0.28s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:2;}
.jar-outer.shaking{animation:shake 0.55s cubic-bezier(.36,.07,.19,.97);}
@keyframes shake{10%,90%{transform:translateX(-2px) rotate(-1deg)}20%,80%{transform:translateX(5px) rotate(1.8deg)}30%,50%,70%{transform:translateX(-6px) rotate(-2.2deg)}40%,60%{transform:translateX(6px) rotate(2.2deg)}}

/* LED canvas sits behind jar */
canvas#leds{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;}

/* SHELF */
.shelf-wood{width:300px;height:16px;background:linear-gradient(180deg,#c89840 0%,#8a5c18 55%,#4e3008 100%);border-radius:3px 3px 7px 7px;box-shadow:0 7px 26px rgba(0,0,0,0.6),0 1px 0 rgba(255,220,100,0.2),inset 0 1px 0 rgba(255,235,140,0.2);}
.shelf-shadow{width:260px;height:10px;background:radial-gradient(ellipse 80% 100% at 50% 0%,rgba(0,0,0,0.5) 0%,transparent 100%);margin:0 auto;}

/* HINT */
/* FILTER PILLS */
.pulls{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
.pull-btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.14em;padding:5px 13px;border:1px solid rgba(180,135,40,0.28);background:rgba(10,5,1,0.55);color:rgba(200,160,60,0.72);cursor:pointer;transition:all 0.18s;backdrop-filter:blur(5px);text-transform:uppercase;}
.pull-btn:hover{background:rgba(38,20,3,0.75);color:#e8c860;}
.pull-btn.active{background:rgba(180,135,40,0.26);border-color:#ddc050;color:#f8e890;}

.tap-hint{margin-top:16px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(17, 3, 26, 0.766);letter-spacing:0.08em;transition:opacity 0.4s;text-shadow:0 1px 8px rgba(0,0,0,0.5);}
.counter{margin-top:5px;font-family:'Cinzel',serif;font-size:15px;letter-spacing:0.14em;color:rgba(10, 8, 2, 0.55);min-height:16px;text-align:center;}
.fav-stack{margin-top:10px;display:flex;gap:6px;min-height:20px;flex-wrap:wrap;justify-content:center;max-width:320px;}
.fav-chip{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;padding:3px 12px;background:rgba(10,5,1,0.65);color:#d4a850;border:0.5px solid rgba(180,135,40,0.35);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;backdrop-filter:blur(4px);}

/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(6,2,0,0.7);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.show{opacity:1;pointer-events:all;}



/* CARD */
.card{width:92%;max-width:310px;border-radius:4px;overflow:hidden;position:relative;transform:translateY(38px) scale(0.87) rotate(-1.5deg);transition:transform 0.42s cubic-bezier(.34,1.56,.64,1);box-shadow:0 42px 100px rgba(0,0,0,0.65),0 8px 28px rgba(0,0,0,0.4),0 0 0 1px rgba(180,135,40,0.22);}
.overlay.show .card{transform:translateY(0) scale(1) rotate(0deg);}
.card-corner{position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 34px 34px 0;border-color:transparent rgba(255,255,255,0.15) transparent transparent;z-index:3;}

/* card photo area */
.note-fill{width:100%;height:240px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;}
.note-grad{position:absolute;inset:0;}
.note-number{position:absolute;top:18px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.28em;color:rgba(255,255,255,0.45);text-transform:uppercase;}
.note-text-wrap{position:relative;z-index:1;width:100%;padding:1.3rem 1.6rem 1.1rem;}
.note-text{font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;line-height:1.55;font-weight:400;font-style:italic;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,0.55);}
.note-heart{font-size:20px;margin-top:7px;display:block;}

.card-body{background:linear-gradient(135deg,#fdf4e3 0%,#f8ecda 100%);padding:0.9rem 1.4rem 1.1rem;border-top:1px solid rgba(180,135,40,0.15);}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-close{background:none;border:none;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:#8a6830;cursor:pointer;transition:color 0.15s;padding:0;}
.card-close:hover{color:#3a1800;}
.card-actions{display:flex;gap:7px;}
.card-fav{background:none;border:1px solid rgba(180,135,40,0.32);padding:5px 13px;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;color:#8a6830;cursor:pointer;transition:all 0.15s;}
.card-fav:hover,.card-fav.saved{background:#f2e0a8;border-color:#c09030;color:#5a2800;}
.card-next{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 15px;border:1px solid rgba(180,135,40,0.32);background:none;color:#8a6830;cursor:pointer;transition:all 0.15s;}
.card-next:hover{background:#f2e0a8;color:#3a1800;}

/* DECO CORNERS */
.deco{position:fixed;width:90px;height:90px;z-index:4;pointer-events:none;opacity:0.4;}
.deco.tl{top:0;left:0;}.deco.tr{top:0;right:0;transform:scaleX(-1);}.deco.bl{bottom:0;left:0;transform:scaleY(-1);}.deco.br{bottom:0;right:0;transform:scale(-1);}
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="page-overlay" id="pageOverlay"></div>

let filter='all', count=0, lastIdx=-1, currentReason=null, favs=[], opened=new Set();

function setFilter(f, btn){
  filter=f;
  document.querySelectorAll('.pull-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

function getFiltered(){ return filter==='all' ? REASONS : REASONS.filter(n=>n.t===filter); }

function pickReason(){
  let pool = getFiltered();
  if(pool.length > 1 && lastIdx > -1){ const li=REASONS[lastIdx]; pool=pool.filter(n=>n!==li); }
  if(pool.length === 0) pool = getFiltered();
  const r = pool[Math.floor(Math.random()*pool.length)];
  lastIdx = REASONS.indexOf(r);
  return r;
}

function onJarClick(){ doShake(); }

function doShake(){
  const w = document.getElementById('jarOuter');
  w.classList.remove('shaking'); void w.offsetWidth; w.classList.add('shaking');
  setTimeout(() => { w.classList.remove('shaking'); openReason(pickReason()); }, 560);
}

function openReason(r){
  currentReason = r; count++;
  opened.add(r.n);
  document.getElementById('noteCat').textContent = r.cat;
  document.getElementById('noteNumber').textContent = r.t==='love' ? 'reason '+r.n+' of 50' : '';
  document.getElementById('noteText').innerHTML = r.text;
  document.getElementById('noteHeart').innerHTML = r.heart;
  document.getElementById('noteGrad').style.background = r.grad;
  const isFav = favs.some(f=>f.n===r.n);
  const fb = document.getElementById('favBtn');
  fb.innerHTML = isFav ? '♥ saved' : '♡ save';
  fb.classList.toggle('saved', isFav);
  document.getElementById('tapHint').style.opacity = '0.35';
  const loveOpened = [...opened].filter(id=>id<=100).length;
  document.getElementById('counter').textContent =
      loveOpened + ' of 100 love reasons discovered';
  document.getElementById('overlay').classList.add('show');
}

function closeCard(){ document.getElementById('overlay').classList.remove('show'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('overlay')) closeCard(); }

function toggleFav(){
  if(!currentReason) return;
  const idx = favs.findIndex(f=>f.n===currentReason.n);
  if(idx>-1) favs.splice(idx,1); else favs.push(currentReason);
  const isFav = favs.some(f=>f.n===currentReason.n);
  document.getElementById('favBtn').innerHTML = isFav ? '♥ saved' : '♡ save';
  document.getElementById('favBtn').classList.toggle('saved', isFav);
  renderFavs();
}

function renderFavs(){
  const s = document.getElementById('favStack'); s.innerHTML='';
  favs.slice(-4).forEach(r=>{
    const c = document.createElement('div'); c.className='fav-chip';
    c.title=r.text; c.textContent='#'+r.n+' '+r.text.slice(0,28)+'…'; s.appendChild(c);
  });
}

/* ===== LED LIGHTS ===== */
const LED_COLORS = ['#ff4444','#ff8800','#ffee00','#44ff44','#44aaff','#aa44ff','#ff44aa','#ffffff','#00ffcc','#ff6644'];
let leds = [], ledAnimId = null;

function initLEDs(){
  const canvas = document.getElementById('leds');
  const jarEl = document.getElementById('jarSvg');
  const w = jarEl.offsetWidth || 220;
  const h = jarEl.offsetHeight || 360;
  canvas.width = w;
  canvas.height = h;

  // Place LEDs wrapped around the jar neck/collar area in a wavy string
  leds = [];
  const numLeds = 22;
  // String wraps around x range 20..200 at y range 65..86 (collar area), wiggling
  for(let i=0;i<numLeds;i++){
    const t = i / (numLeds-1);
    const x = 22 + t * (w - 44);
    // Wavy y — alternates above and below collar
    const wave = Math.sin(t * Math.PI * 4) * 8;
    const y = 76 + wave;
    leds.push({
      x, y,
      color: LED_COLORS[i % LED_COLORS.length],
      phase: Math.random() * Math.PI * 2,
      speed: 0.04 + Math.random() * 0.03,
      r: 3.5 + Math.random() * 1.5,
    });
  }

  // Draw wire connecting LEDs
  drawLEDs();
}

function drawLEDs(){
  const canvas = document.getElementById('leds');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const now = Date.now() * 0.001;

  // Draw wire
  if(leds.length > 1){
    ctx.beginPath();
    ctx.moveTo(leds[0].x, leds[0].y);
    for(let i=1;i<leds.length;i++){
      const mx = (leds[i-1].x + leds[i].x)/2;
      const my = (leds[i-1].y + leds[i].y)/2 + 3;
      ctx.quadraticCurveTo(leds[i-1].x, leds[i-1].y+4, leds[i].x, leds[i].y);
    }
    ctx.strokeStyle = 'rgba(80,60,30,0.6)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // Draw LEDs
  leds.forEach((led, i) => {
    const brightness = 0.45 + 0.55 * Math.sin(now * led.speed * 60 + led.phase);
    const alpha = 0.6 + 0.4 * brightness;

    // Glow effect
    const glowR = led.r * (3 + 2 * brightness);
    const grd = ctx.createRadialGradient(led.x, led.y, 0, led.x, led.y, glowR);
    grd.addColorStop(0, led.color + 'cc');
    grd.addColorStop(0.4, led.color + '55');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(led.x, led.y, glowR, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.globalAlpha = brightness * 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Bulb socket (tiny dark cap on top)
    ctx.beginPath();
    ctx.arc(led.x, led.y - led.r * 0.5, led.r * 0.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(40,20,5,0.85)';
    ctx.fill();

    // Bulb body
    ctx.beginPath();
    ctx.arc(led.x, led.y + led.r * 0.2, led.r, 0, Math.PI*2);
    ctx.fillStyle = led.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Shine dot
    ctx.beginPath();
    ctx.arc(led.x - led.r*0.3, led.y - led.r*0.1, led.r*0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.globalAlpha = brightness * 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  ledAnimId = requestAnimationFrame(drawLEDs);
}

/* ===== PARTICLE SYSTEM ===== */
const THEME_PARTICLES = {day:'blossom',night:'stars',spring:'petals',autumn:'leaves',snow:'snow'};
function setTheme(t){
  document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('btn'+t[0].toUpperCase()+t.slice(1)).classList.add('on');
  const ov = document.getElementById('pageOverlay');
  if(t==='night') ov.style.background='radial-gradient(ellipse 130% 130% at 50% 50%,rgba(3,1,15,0.4) 0%,rgba(1,0,8,0.82) 100%),linear-gradient(to bottom,rgba(1,0,8,0.6) 0%,transparent 35%,transparent 65%,rgba(1,0,8,0.6) 100%)';
  else if(t==='spring') ov.style.background='radial-gradient(ellipse 130% 130% at 50% 50%,rgba(255,230,240,0.06) 0%,rgba(8,3,0,0.6) 100%),linear-gradient(to bottom,rgba(8,3,0,0.5) 0%,transparent 35%,transparent 65%,rgba(8,3,0,0.5) 100%)';
  else if(t==='autumn') ov.style.background='radial-gradient(ellipse 130% 130% at 50% 50%,rgba(80,30,0,0.1) 0%,rgba(18,5,0,0.72) 100%),linear-gradient(to bottom,rgba(18,5,0,0.55) 0%,transparent 35%,transparent 65%,rgba(18,5,0,0.55) 100%)';
  else if(t==='snow') ov.style.background='radial-gradient(ellipse 130% 130% at 50% 50%,rgba(200,220,255,0.08) 0%,rgba(4,8,18,0.72) 100%),linear-gradient(to bottom,rgba(4,8,18,0.55) 0%,transparent 35%,transparent 65%,rgba(4,8,18,0.55) 100%)';
  else ov.style.background='radial-gradient(ellipse 130% 130% at 50% 50%,rgba(10,4,1,0.15) 0%,rgba(5,2,0,0.68) 100%),linear-gradient(to bottom,rgba(5,2,0,0.5) 0%,rgba(0,0,0,0.0) 35%,rgba(0,0,0,0.0) 65%,rgba(5,2,0,0.55) 100%)';
  initParticles(THEME_PARTICLES[t]);
}

let pAnimId=null, particles=[];
function initParticles(type){
  if(pAnimId)cancelAnimationFrame(pAnimId); particles=[];
  const c=document.getElementById('particles');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const n=type==='stars'?90:type==='snow'?55:30;
  for(let i=0;i<n;i++){
    const p={x:Math.random()*c.width,y:Math.random()*(type==='stars'?c.height:-200),type};
    if(type==='stars'){p.r=Math.random()*1.8+0.4;p.op=Math.random()*0.6+0.2;p.tw=Math.random()*Math.PI*2;p.ts=Math.random()*0.04+0.01;}
    else if(type==='snow'){p.r=Math.random()*4+2;p.vy=Math.random()*0.7+0.3;p.vx=(Math.random()-0.5)*0.3;p.op=Math.random()*0.45+0.18;p.wb=Math.random()*Math.PI*2;}
    else if(type==='leaves'){p.r=Math.random()*7+4;p.vy=Math.random()*0.8+0.35;p.vx=(Math.random()-0.5)*0.6;p.a=Math.random()*Math.PI*2;p.va=(Math.random()-0.5)*0.025;p.op=Math.random()*0.5+0.15;p.col=['#e8a060','#d06030','#c84020','#e0b060'][Math.floor(Math.random()*4)];}
    else{p.r=Math.random()*7+3;p.vy=Math.random()*0.65+0.25;p.vx=(Math.random()-0.5)*0.45;p.a=Math.random()*Math.PI*2;p.va=(Math.random()-0.5)*0.018;p.op=Math.random()*0.38+0.1;p.col=type==='petals'?['#f7b8cc','#e8a8e8','#ffd0e8'][Math.floor(Math.random()*3)]:['#f9d0dc','#eecaf2','#fce8f6'][Math.floor(Math.random()*3)];}
    particles.push(p);
  }
  tickP();
}
function tickP(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  if(c.width!==window.innerWidth){c.width=window.innerWidth;c.height=window.innerHeight;}
  particles.forEach(p=>{
    ctx.save();
    if(p.type==='stars'){p.tw+=p.ts;ctx.globalAlpha=p.op*(0.5+0.5*Math.sin(p.tw));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='#ffe8b0';ctx.fill();}
    else if(p.type==='snow'){p.wb+=0.02;p.x+=p.vx+Math.sin(p.wb)*0.3;p.y+=p.vy;if(p.y>c.height+10){p.y=-10;p.x=Math.random()*c.width;}ctx.globalAlpha=p.op;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='#e8f4ff';ctx.fill();}
    else{p.x+=p.vx;p.y+=p.vy;p.a+=p.va;if(p.y>c.height+20){p.y=-20;p.x=Math.random()*c.width;}ctx.globalAlpha=p.op;ctx.translate(p.x,p.y);ctx.rotate(p.a);if(p.type==='leaves'){ctx.beginPath();ctx.ellipse(0,0,p.r*1.6,p.r*0.7,0,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();}else{ctx.beginPath();ctx.ellipse(0,0,p.r*1.8,p.r*0.85,0,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();}}
    ctx.restore();
  });
  pAnimId=requestAnimationFrame(tickP);
}

window.addEventListener('resize',()=>{
  const c=document.getElementById('particles');c.width=window.innerWidth;c.height=window.innerHeight;
  initLEDs();
});

if(window.DeviceMotionEvent){
  let last=0;
  window.addEventListener('devicemotion',e=>{
    const a=e.accelerationIncludingGravity;if(!a)return;
    const m=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z),now=Date.now();
    if(m>22&&now-last>1200){last=now;doShake();}
  });
}

window.addEventListener('load',()=>{
  setTheme('day');
  setTimeout(initLEDs, 100);
});
